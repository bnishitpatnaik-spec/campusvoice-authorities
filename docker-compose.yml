networks:
  campus-network:
    driver: bridge

services:

  # ── AI Service (FastAPI) ──────────────────────────────────────
  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: campusvoice-ai
    restart: unless-stopped
    ports:
      - "8001:8001"
    env_file:
      - ./ai-service/.env
    networks:
      - campus-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── Authority Backend (Node.js) ───────────────────────────────
  authority-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: campusvoice-authority-backend
    restart: unless-stopped
    ports:
      - "5002:5002"
    env_file:
      - ./backend/.env
    environment:
      - AI_SERVICE_URL=http://ai-service:8001
    depends_on:
      ai-service:
        condition: service_healthy
    networks:
      - campus-network

  # ── Frontend (React + Vite → served via `serve`) ──────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: campusvoice-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - authority-backend
    networks:
      - campus-network
